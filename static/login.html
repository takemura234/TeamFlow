<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#153d32">
  <title>ログイン | TeamFlow</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="icon" href="/static/teamflow-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/teamflow-icon.svg">
  <style>
    :root{--ink:#17231f;--muted:#69766f;--green:#235c49;--line:#dce3dd}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#edf1eb;color:var(--ink);font-family:"Yu Gothic UI","Hiragino Sans",sans-serif}.login-shell{width:min(920px,calc(100% - 28px));min-height:560px;display:grid;grid-template-columns:1.1fr .9fr;background:#fff;box-shadow:0 25px 70px rgba(30,52,43,.13)}.login-brand{position:relative;overflow:hidden;background:#153d32;color:#fff;padding:64px;display:flex;flex-direction:column;justify-content:space-between}.login-brand:after{content:"";position:absolute;width:360px;height:360px;border:75px solid rgba(215,235,117,.1);border-radius:50%;right:-150px;bottom:-130px}.mark{width:52px;height:52px;border:1px solid rgba(255,255,255,.5);display:grid;place-items:center;font-family:Georgia,serif;font-size:20px}.login-brand h1{font:500 44px/1.15 Georgia,"Yu Mincho",serif;margin:0 0 18px}.login-brand p{color:#bfd1c9;line-height:1.8}.login-panel{padding:70px 58px;display:flex;flex-direction:column;justify-content:center}.eyebrow{font-size:10px;letter-spacing:.18em;font-weight:800;color:#75827b}.login-panel h2{font-size:27px;margin:8px 0 30px}.login-form{display:grid;gap:18px}.login-form label{display:grid;gap:8px;font-size:12px;font-weight:700}.login-form input{font:inherit;border:1px solid var(--line);border-radius:8px;padding:13px}.login-form button{border:0;border-radius:8px;background:var(--green);color:#fff;padding:14px;font:inherit;font-weight:700;cursor:pointer}.error{min-height:20px;color:#b3433b;font-size:13px}.note{margin-top:24px;color:var(--muted);font-size:12px;line-height:1.7}@media(max-width:700px){.login-shell{grid-template-columns:1fr}.login-brand{min-height:230px;padding:34px}.login-brand h1{font-size:34px}.login-panel{padding:42px 30px}}
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-brand"><span class="mark">TF</span><div><h1>チームの流れを、<br>ひとつ先へ。</h1><p>優先順位と進捗を共有し、次の行動を明確にする開発チーム管理ツール。</p></div></section>
    <section class="login-panel">
      <p class="eyebrow">TEAMFLOW WORKSPACE</p>
      <h2>ログイン</h2>
      <form id="loginForm" class="login-form">
        <label>ログインID<input name="username" autocomplete="username" required autofocus></label>
        <label>パスワード<input name="password" type="password" autocomplete="current-password" required></label>
        <p id="loginError" class="error"></p>
        <button type="submit">TeamFlowを開く</button>
      </form>
      <p class="note">初期管理者IDは <strong>admin</strong> です。初期パスワードは管理者に確認してください。</p>
    </section>
  </main>
  <script src="/static/login.js"></script>
  <script src="/static/pwa.js"></script>
</body>
</html>
